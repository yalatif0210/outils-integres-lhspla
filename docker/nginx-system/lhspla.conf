# /etc/nginx/sites-available/lhspla
# Config nginx SYSTÈME pour vps.lhspla-ci.org
# Déployé par scripts/init-server.sh → copié dans /etc/nginx/sites-available/lhspla

# HTTP : ACME challenge + redirect HTTPS
server {
    listen 80;
    server_name vps.lhspla-ci.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS : proxy vers prod-frontend (Docker, port local 8090)
server {
    listen 443 ssl http2;
    server_name vps.lhspla-ci.org;

    ssl_certificate     /etc/letsencrypt/live/vps.lhspla-ci.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vps.lhspla-ci.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
