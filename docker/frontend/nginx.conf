server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API → container NestJS
    # location /api/ avec trailing slash : nginx retire /api/ avant de passer à proxy_pass
    location /api/ {
        proxy_pass         http://${API_HOST}:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # Proxy fichiers uploadés
    location /uploads/ {
        proxy_pass         http://${API_HOST}:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Host          $host;
    }

    # Module Collecte — frontend Angular (^~ bloque le matching regex ~*.js sur ces chemins)
    location ^~ /collecte/ {
        proxy_pass         http://${COLLECTE_FRONT_HOST}:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Module Collecte — API NestJS
    location ^~ /collecte-api/ {
        proxy_pass         http://${COLLECTE_API_HOST}:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA Angular (app principale)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_comp_level 6;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }
}
