  version: '3.8'

  services:
    n8n:
      image: n8nio/n8n:latest
      container_name: lhspla_n8n
      restart: unless-stopped
      ports:
        - "5678:5678"
      environment:
        - N8N_HOST=localhost
        - N8N_PORT=5678
        - N8N_PROTOCOL=http
        - WEBHOOK_URL=http://localhost:5678/
        - N8N_BASIC_AUTH_ACTIVE=true
        - N8N_BASIC_AUTH_USER=admin
        - N8N_BASIC_AUTH_PASSWORD=lhspla_n8n_2026
        - GENERIC_TIMEZONE=Africa/Abidjan
        - TZ=Africa/Abidjan
      volumes:
        - n8n_data:/home/node/.n8n

  volumes:
    n8n_data:
      driver: local