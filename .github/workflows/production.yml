name: 🚀 Deploy Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/lhspla-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/lhspla-frontend

jobs:
  # ── Vérification staging ────────────────────────────────────────────────────
  check-staging:
    name: Vérifier Staging
    runs-on: ubuntu-latest
    steps:
      - name: Health check staging (port 8080)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://vps.lhspla-ci.org:8080/api/health || echo "000")
          echo "Staging: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Staging non disponible — déploiement production annulé"
            exit 1
          fi
          echo "✅ Staging OK"

  # ── Build & Push images production ─────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: check-staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:prod
            ${{ env.API_IMAGE }}:prod-${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:prod
          cache-to:   type=inline

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:prod
            ${{ env.FRONTEND_IMAGE }}:prod-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:prod
          cache-to:   type=inline

  # ── Deploy Production ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer VPS — cloner repo si absent, sinon pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="/home/markov/lhspla"
            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" fetch origin
              git -C "$APP_DIR" checkout main
              git -C "$APP_DIR" pull origin main
            else
              git clone -b main https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git "$APP_DIR"
            fi

      - name: Écrire .env.prod depuis les secrets GitHub
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            printf '%s\n' \
              'GITHUB_REPOSITORY=${{ github.repository }}' \
              'PROD_DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}' \
              'PROD_JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}' \
              'PROD_JWT_REFRESH_SECRET=${{ secrets.PROD_JWT_REFRESH_SECRET }}' \
              'MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}' \
              'ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}' \
              'PGADMIN_EMAIL=admin@lhspla.ci' \
              'PGADMIN_PASSWORD=${{ secrets.PGADMIN_PASSWORD }}' \
              'N8N_USER=admin' \
              'N8N_PASSWORD=${{ secrets.N8N_PASSWORD }}' \
              'MAIL_HOST=smtp.gmail.com' \
              'MAIL_PORT=587' \
              'MAIL_USER=' \
              'MAIL_PASS=' \
              'MAIL_FROM=LHSPLA <noreply@lhspla.ci>' \
              > /home/markov/lhspla/.env.prod
            chmod 600 /home/markov/lhspla/.env.prod
            echo "✅ .env.prod écrit ($(wc -l < /home/markov/lhspla/.env.prod) lignes)"

      - name: Docker pull & up production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/markov/lhspla

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

            sleep 10
            docker exec prod-api sh -c "npx ts-node prisma/seed.ts" 2>/dev/null || true

      - name: Configurer nginx système + SSL (idempotent)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo bash /home/markov/lhspla/scripts/setup-nginx-system.sh

      - name: Health check production (nginx → api)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Attente démarrage production (max 2 min)..."
            for i in $(seq 1 24); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://vps.lhspla-ci.org/api/health 2>/dev/null || echo "000")
              echo "Tentative $i/24 — HTTP $STATUS"
              [ "$STATUS" = "200" ] && { echo "✅ Production opérationnelle"; exit 0; }
              sleep 5
            done
            echo "--- Logs prod-api (debug) ---"
            docker logs prod-api --tail 30
            echo "❌ Production non disponible après 2 minutes"
            exit 1

      - name: Rollback si échec
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "❌ Déploiement échoué — rollback..."
            cd /home/markov/lhspla
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d || true
