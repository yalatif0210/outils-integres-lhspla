name: 🚀 Deploy Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/lhspla-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lhspla-frontend

jobs:
  # ── Vérification staging ────────────────────────────────────────────────────
  check-staging:
    name: Vérifier Staging
    runs-on: ubuntu-latest
    steps:
      - name: Health check staging (port 8080)
        run: |
          echo "Vérification que le staging est sain..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://vps.lhspla-ci.org:8080/api/health || echo "000")
          echo "Staging: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Staging non disponible — déploiement production annulé"
            exit 1
          fi
          echo "✅ Staging OK"

  # ── Build & Push images production ─────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: check-staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:prod
            ${{ env.API_IMAGE }}:prod-${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:prod
          cache-to:   type=inline

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:prod
            ${{ env.FRONTEND_IMAGE }}:prod-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:prod
          cache-to:   type=inline

  # ── Deploy Production ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/markov

            # Mettre à jour le code de déploiement
            git -C /home/markov pull origin main 2>/dev/null || true

            # Injecter GITHUB_REPOSITORY
            export GITHUB_REPOSITORY="${{ github.repository }}"
            echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY" > /tmp/ci-prod.env
            cat .env.prod >> /tmp/ci-prod.env

            # Deploy
            docker compose -f docker-compose.prod.yml --env-file /tmp/ci-prod.env pull
            docker compose -f docker-compose.prod.yml --env-file /tmp/ci-prod.env up -d --remove-orphans
            rm /tmp/ci-prod.env

            # Seed (idempotent)
            sleep 10
            docker exec prod-api sh -c "npx ts-node prisma/seed.ts" 2>/dev/null || true

      - name: Health check production (port 443)
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://vps.lhspla-ci.org/api/health || echo "000")
          echo "Production health: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Notification déploiement réussi
        if: success()
        run: |
          echo "✅ Production déployée avec succès — commit ${{ github.sha }}"

      - name: Rollback si échec
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "❌ Déploiement échoué — rollback vers l'image précédente..."
            cd /home/markov
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-build || true
