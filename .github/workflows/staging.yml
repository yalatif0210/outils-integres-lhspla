name: 🧪 Deploy Staging

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/lhspla-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lhspla-frontend

jobs:
  # ── Build & Push images ─────────────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:staging
            ${{ env.API_IMAGE }}:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:staging
          cache-to:   type=inline

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:staging
            ${{ env.FRONTEND_IMAGE }}:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:staging
          cache-to:   type=inline

  # ── Deploy Staging ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/markov

            # Mettre à jour le code de déploiement
            git -C /home/markov pull origin develop 2>/dev/null || true

            # Injecter GITHUB_REPOSITORY dans l'env staging
            export GITHUB_REPOSITORY="${{ github.repository }}"
            echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY" > /tmp/ci-staging.env
            cat .env.staging >> /tmp/ci-staging.env

            # Deploy
            docker compose -f docker-compose.staging.yml --env-file /tmp/ci-staging.env pull
            docker compose -f docker-compose.staging.yml --env-file /tmp/ci-staging.env up -d --remove-orphans
            rm /tmp/ci-staging.env

            # Seed (idempotent)
            sleep 8
            docker exec stg-api sh -c "npx ts-node prisma/seed.ts" 2>/dev/null || true

      - name: Health check staging (port 8080)
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://vps.lhspla-ci.org:8080/api/health || echo "000")
          echo "Staging health: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1
